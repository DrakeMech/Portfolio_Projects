<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>title</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="font-family: system-ui, sans-serif; margin: 1rem;">
        <h3>Sensor → Web MIDI bridge</h3>
        <div style="display:flex; gap:.5rem; align-items:center; flex-wrap: wrap;">
            <label for="midiOutputs"><strong>MIDI Output:</strong></label>
            <select id="midiOutputs"></select>
            <button id="refreshMidi">Refresh</button>
            <span id="midiStatus" style="opacity:.8"></span>
            <button id="monitorBtn" style="margin-left:auto;">Monitor</button>
        </div>
        <div id="monitorPanel" style="margin-top:1rem; border:1px solid #00ccff; border-radius:8px; background:#111; color:#eee; padding:0.75rem; display:none;">
          <div id="monitorControls" style="display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:10px;"></div>
          <div id="monitorTabBar" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;"></div>
          <div id="monitorStats" style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:8px; color:#ddd;"></div>
          <div id="monitorContent" style="padding:8px; background:#141414; border:1px solid #00aaff; border-radius:6px;">
            <div id="monitorGraphArea" style="min-height:220px;"></div>
          </div>
        </div>
        <div style="margin-top:.5rem; font-size:.9rem; opacity:.8;">
            Tip: On Windows, install a virtual loopback port (e.g., loopMIDI), select it here,
            then choose the same port as input in Pocket MIDI.
        </div>
        <hr/>
        <div style="display:flex; gap:.5rem; align-items:center; flex-wrap: wrap; margin:.5rem 0;">
          <strong>Assign helpers:</strong>
          <div id="assignControls" style="display:flex; gap:.5rem; flex-wrap: wrap;">
          </div>
        </div>
        <hr/>
        <div style="margin-top: 1rem;">
          <h4>Transformation Mapping</h4>
          <div id="transformationEditor" style="border: 1px solid #00ccff; border-radius: 6px; padding: 12px; background: #111; color: #eee;">
            <label><strong>Custom Transformation Code:</strong></label>
            <div style="margin-top: 8px; margin-bottom: 8px; font-size: 0.9rem; opacity: 0.8;">
              Define custom transformation functions. Available params: <code>v</code> (raw value), <code>cc</code> (CC number).
            </div>
            <textarea id="customTransformCode" style="width: 100%; height: 150px; font-family: monospace; font-size: 12px; padding: 8px; background: #0a0a0a; color: #00ff00; border: 1px solid #00ccff; border-radius: 4px;">
// Multi-arg example: combine X and Y coordinates
export function xyDistance(x, y) {
  const dist = Math.sqrt(x*x + y*y);
  return Math.max(0, Math.min(127, Math.round(dist * 10)));
}

// Single arg: scale and offset
export function customScale(value) {
  return Math.max(0, Math.min(127, Math.round(value * 100)));
}

// Polygon example: area * angle
export function areaAngleProduct(area, angle) {
  return Math.max(0, Math.min(127, Math.round(area * Math.abs(angle))));
}</textarea>
            <button id="applyTransformCode" style="margin-top: 8px; padding: 6px 12px; border: 1px solid #00ccff; background: #222; color: #00ccff; cursor: pointer; border-radius: 4px;">Load Custom Transformations</button>
            <div id="transformationStatus" style="margin-top: 8px; font-size: 0.9rem; color: #aaa;"></div>
          </div>
        </div>
    </div>
    <script type="module" src="transformationMapping.js"></script>
    <script type="module" src="dataCalculations.js"></script>
    <script type="module" src="transformationSelector.js"></script>
    <script type="module" src="transformation-editor.js"></script>
    <script type="module" src="monitoring.js"></script>
    <script type="module" src="midi-setup.js"></script>
    <script type="module" src="websocket-handler.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
