<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>title</title>
</head>
<body>
    <div style="font-family: system-ui, sans-serif; margin: 1rem;">
        <h3>Sensor → Web MIDI bridge</h3>
        <div style="display:flex; gap:.5rem; align-items:center; flex-wrap: wrap;">
            <label for="midiOutputs"><strong>MIDI Output:</strong></label>
            <select id="midiOutputs"></select>
            <button id="refreshMidi">Refresh</button>
            <span id="midiStatus" style="opacity:.8"></span>
        </div>
        <div style="margin-top:.5rem; font-size:.9rem; opacity:.8;">
            Tip: On Windows, install a virtual loopback port (e.g., loopMIDI), select it here,
            then choose the same port as input in Pocket MIDI.
        </div>
        <hr/>
    </div>
    <script type="module" src="script.js"></script>
    <!-- <script type="module" src="sensorReceiver.js"></script> -->
</body>
</html>
